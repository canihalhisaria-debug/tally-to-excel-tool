<!DOCTYPE html>
<html>
<head>
<title>Tally Excel Preview Tool</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
padding:40px;
}

.container{
background:white;
padding:25px;
max-width:500px;
margin:auto;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#007bff;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

pre{
background:#111;
color:#0f0;
padding:10px;
overflow:auto;
}
</style>
</head>

<body>

<div class="container">

<h2>Tally to Excel Preview</h2>

<form id="uploadForm">

<label>Excel File</label><br>
<input type="file" id="file" required><br><br>

<label>From Date</label><br>
<input type="date" id="from_date"><br><br>

<label>To Date</label><br>
<input type="date" id="to_date"><br><br>

<label>Voucher Types</label><br>
<input type="text" id="voucher_types"><br><br>

<button type="submit">Preview Excel</button>

</form>

<h3>Preview Response</h3>

<pre id="output"></pre>

</div>

<script>

document.getElementById("uploadForm").addEventListener("submit", async function(e){

e.preventDefault()

let file = document.getElementById("file").files[0]

let formData = new FormData()

formData.append("file",file)
formData.append("from_datestring",document.getElementById("from_date").value)
formData.append("to_datestring",document.getElementById("to_date").value)
formData.append("voucher_types",document.getElementById("voucher_types").value)

let response = await fetch(
"https://tally-to-excel-tool.onrender.com/preview",
{
method:"POST",
body:formData
}
)

let data = await response.json()

document.getElementById("output").textContent =
JSON.stringify(data,null,2)

})

</script>

</body>
</html>
