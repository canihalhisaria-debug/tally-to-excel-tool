<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Preview Uploader</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --border: #dbe4f0;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: min(680px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    button {
      margin-top: 4px;
      border: 0;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:disabled {
      opacity: 0.6;
      cursor: progress;
    }

    .response {
      margin-top: 20px;
    }

    .response h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    pre {
      margin: 0;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: #0f172a;
      overflow: auto;
      min-height: 120px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Excel Preview Uploader</h1>
    <p class="subtitle">Upload your .xlsx file and view the API JSON preview response.</p>

    <form id="previewForm" enctype="multipart/form-data">
      <label for="file">
        Excel file (.xlsx)
        <input id="file" name="file" type="file" accept=".xlsx" required />
      </label>

      <label for="fromDate">
        From date
        <input id="fromDate" name="from_date" type="date" required />
      </label>

      <label for="toDate">
        To date
        <input id="toDate" name="to_date" type="date" required />
      </label>

      <label for="voucherTypes">
        Voucher types
        <input id="voucherTypes" name="voucher_types" type="text" placeholder="Sales, Purchase, Receipt" required />
      </label>

      <button type="submit" id="submitBtn">Upload &amp; Preview</button>
    </form>

    <section class="response">
      <h2>Preview JSON Response</h2>
      <pre id="result">Submit the form to see API response here.</pre>
    </section>
  </main>

  <script>
    const form = document.getElementById('previewForm');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const formData = new FormData(form);
      submitBtn.disabled = true;
      result.textContent = 'Uploading and fetching preview...';

      try {
        const response = await fetch('https://tally-to-excel-tool.onrender.com/preview', {
          method: 'POST',
          body: formData
        });

        const responseText = await response.text();
        let payload;

        try {
          payload = JSON.parse(responseText);
        } catch {
          payload = { raw: responseText };
        }

        if (!response.ok) {
          result.textContent = JSON.stringify(
            {
              status: response.status,
              statusText: response.statusText,
              error: payload
            },
            null,
            2
          );
          return;
        }

        result.textContent = JSON.stringify(payload, null, 2);
      } catch (error) {
        result.textContent = JSON.stringify(
          {
            error: 'Request failed',
            message: error.message
          },
          null,
          2
        );
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
