<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tally XML to Excel Tool</title>

<style>
body{
font-family:Arial;
background:#f5f7fb;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
margin-bottom:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:5px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#1e40af;
}

pre{
background:#111;
color:#00ff88;
padding:15px;
overflow:auto;
border-radius:5px;
}

.download{
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Tally XML to Excel Converter</h1>

<p><b>Instruction:</b> Export XML from Tally and upload here.</p>

<form id="uploadForm">

<label>Upload Tally XML File</label>
<input type="file" id="xml_file" accept=".xml" required>

<label>From Date</label>
<input type="date" id="from_date">

<label>To Date</label>
<input type="date" id="to_date">

<label>Voucher Type</label>
<select id="voucher_type">
<option value="">All</option>
<option value="Sales">Sales</option>
<option value="Purchase">Purchase</option>
<option value="Receipt">Receipt</option>
<option value="Payment">Payment</option>
<option value="Journal">Journal</option>
</select>

<button type="submit">Preview XML</button>

</form>

<h3>Preview Result</h3>

<pre id="previewBox">No data yet...</pre>

<button id="processBtn">Generate Excel</button>

<div class="download" id="downloadSection"></div>

</div>

<script>

let uploadedFileId=null;

document.getElementById("uploadForm").addEventListener("submit",async function(e){

e.preventDefault()

let file=document.getElementById("xml_file").files[0]

let formData=new FormData()

formData.append("file",file)

let response=await fetch(
"https://tally-to-excel-tool.onrender.com/upload-xml-preview",
{
method:"POST",
body:formData
})

let data=await response.json()

uploadedFileId=data.file_id

document.getElementById("previewBox").textContent=
JSON.stringify(data.preview,null,2)

})

document.getElementById("processBtn").addEventListener("click",async function(){

if(!uploadedFileId){
alert("Upload XML first")
return
}

let payload={
file_id:uploadedFileId,
from_date:document.getElementById("from_date").value,
to_date:document.getElementById("to_date").value,
voucher_type:document.getElementById("voucher_type").value
}

let response=await fetch(
"https://tally-to-excel-tool.onrender.com/process-xml",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(payload)
})

let data=await response.json()

document.getElementById("downloadSection").innerHTML=
`<a href="https://tally-to-excel-tool.onrender.com/download/${data.file_id}">
Download Excel File
</a>`

})

</script>

</body>
</html>
